<!DOCTYPE HTML>
<html>
<head>
    <title>Cantaor app</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1 class="app-title">Cantaor app</h1>
        <p class="app-subtitle">Vamo a cantá un poquito pó . . .</p>
        
        <div class="palo-selector">
            <div class="custom-select-wrapper">
                <div class="custom-select-display" id="customSelectDisplay">
                    <span class="custom-select-text">Selecciona un palo...</span>
                    <div class="custom-select-arrow">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                        </svg>
                    </div>
                </div>
                <div class="custom-select-options" id="customSelectOptions">
                    <!-- Options will be populated dynamically -->
                </div>
                <select id="paloSelect" class="palo-select-hidden">
                </select>
            </div>
        </div>

        <div class="player-section">
            <button id="playButton" class="play-button" disabled>
                <div class="play-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M8 5v14l11-7z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="pause-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/>
                    </svg>
                </div>
            </button>
            
        </div>

        <div class="controls-section">
            <div class="control-group">
                <label class="control-label">Compás</label>
                <input type="range" id="tempoSlider" class="control-slider" 
                       min="0.5" max="1.5" step="0.05" value="1.0">
                <div class="control-value" id="tempoValue">1.00x</div>
            </div>

            <div class="control-group">
                <label class="control-label">Cejilla</label>
                <input type="range" id="pitchSlider" class="control-slider" 
                       min="-5" max="5" step="1" value="0">
                <div class="control-value" id="pitchValue">Traste 5</div>
            </div>
        </div>

        <div class="visualizer" id="visualizer">
            <div class="visualizer-bars">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
            </div>
        </div>

        <div class="admin-toggle-section" id="adminToggleSection" style="display:none">
            <button id="adminToggle" class="admin-toggle-btn">Gestionar pistas</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <h2 class="admin-title">Subir pista de cante</h2>

            <div class="admin-form">
                <div class="form-group">
                    <label for="newPalo">Palo</label>
                    <input type="text" id="newPalo" placeholder="Ej: Tangos, Soleá..." class="form-input" list="paloSuggestions">
                    <datalist id="paloSuggestions"></datalist>
                </div>
                <div class="form-group">
                    <label for="newTitle">Titulo</label>
                    <input type="text" id="newTitle" placeholder="Ej: Tangos - Tientos" class="form-input">
                </div>
                <div class="form-group">
                    <label for="newAudio">Archivo de audio</label>
                    <div class="file-input-wrapper">
                        <button type="button" id="audioFileBtn" class="file-input-btn">Seleccionar archivo</button>
                        <span id="audioFileName" class="file-input-name">Ningun archivo seleccionado</span>
                        <input type="file" id="newAudio" accept="audio/*" class="file-input-hidden">
                    </div>
                </div>
                <button id="uploadBtn" class="upload-btn" disabled>Subir pista</button>
            </div>

            <div id="uploadStatus" class="upload-status"></div>

            <div class="track-list-section">
                <h3 class="track-list-title">Pistas existentes</h3>
                <div id="trackList" class="track-list"></div>
            </div>
        </div>

    </div>

    <!-- Auth Modal -->
    <div class="auth-modal-overlay" id="authModalOverlay">
        <div class="auth-modal" id="authModal">
            <button class="auth-modal-close" id="authModalClose" aria-label="Cerrar">&times;</button>

            <div class="auth-modal-header">
                <h2 class="auth-modal-title">Accede a todos los palos</h2>
                <p class="auth-modal-subtitle">Registrate gratis para practicar Bulerias, Soleares y mucho mas</p>
            </div>

            <div id="authFormLogin" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Tu contraseña" autocomplete="current-password">
                </div>
                <div id="authError" class="auth-error"></div>
                <button id="loginSubmitBtn" class="auth-submit-btn">Iniciar sesion</button>
                <p class="auth-switch">No tienes cuenta? <button class="auth-switch-btn" id="switchToRegister">Registrate gratis</button></p>
            </div>

            <div id="authFormRegister" class="auth-form" style="display:none">
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="tu@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Contraseña</label>
                    <input type="password" id="registerPassword" class="form-input" placeholder="Minimo 6 caracteres" autocomplete="new-password">
                </div>
                <div id="authErrorRegister" class="auth-error"></div>
                <button id="registerSubmitBtn" class="auth-submit-btn">Crear cuenta gratis</button>
                <p class="auth-switch">Ya tienes cuenta? <button class="auth-switch-btn" id="switchToLogin">Inicia sesion</button></p>
            </div>
        </div>
    </div>

    <!-- User bar -->
    <div class="user-bar" id="userBar" style="display:none">
        <span class="user-bar-email" id="userBarEmail"></span>
        <button class="user-bar-logout" id="userBarLogout">Salir</button>
    </div>

    <script type="module" src="bundle.js"></script>
</body>
</html>
