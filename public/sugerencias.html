<!DOCTYPE HTML>
<html>
<head>
    <title>Tablero de sugerencias - cantaor.app</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sugerencias-container {
            max-width: 640px;
            width: 100%;
            padding: 0 1.5rem;
        }
        .sugerencias-header {
            text-align: center;
            margin: 2.5rem 0 2rem;
        }
        .sugerencias-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #F5EDE0;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }
        .sugerencias-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 184, 154, 0.7);
        }
        .sugerencias-board {
            background: rgba(20, 10, 10, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 220, 200, 0.12);
            border-radius: 20px;
            padding: 1.75rem;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="top-nav-inner">
            <a href="index.html" class="nav-brand" style="text-decoration:none">
                <span class="nav-brand-icon">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </span>
                <span class="nav-brand-name">cantaor.app</span>
            </a>
            <div class="nav-actions" id="userBar">
                <span class="user-bar-email" id="userBarEmail"></span>
                <button class="user-bar-logout" id="userBarLogout" style="display:none">Salir</button>
                <button class="user-bar-login" id="userBarLogin">Iniciar sesion</button>
            </div>
        </div>
    </nav>

    <div class="app-container sugerencias-container">
        <div class="sugerencias-header">
            <h1 class="sugerencias-title">Tablero de sugerencias</h1>
            <p class="sugerencias-subtitle">Propone y vota las mejoras que quieres ver</p>
        </div>

        <div class="sugerencias-board">
            <div class="suggestions-toolbar">
                <div class="suggestions-sort">
                    <button class="sort-btn active" id="sortByVotes">Mas votadas</button>
                    <button class="sort-btn" id="sortByDate">Mas recientes</button>
                </div>
                <button class="new-suggestion-btn" id="newSuggestionBtn">+ Nueva sugerencia</button>
            </div>
            <div class="suggestions-status-filter">
                <button class="status-filter-btn active" data-status="all" id="sfAll">Todas</button>
                <button class="status-filter-btn" data-status="in_progress" id="sfInProgress">En curso</button>
                <button class="status-filter-btn" data-status="done" id="sfDone">Completadas</button>
            </div>
            <div class="new-suggestion-form" id="newSuggestionForm" style="display:none">
                <div class="form-group"><label for="suggestionTitle">Titulo *</label><input type="text" id="suggestionTitle" class="form-input" placeholder="Ej: Anadir palo de Soleares" maxlength="120"></div>
                <div class="form-group"><label for="suggestionDescription">Descripcion (opcional)</label><textarea id="suggestionDescription" class="form-input suggestion-textarea" placeholder="Explica tu idea..." maxlength="500" rows="3"></textarea></div>
                <div id="suggestionFormError" class="auth-error"></div>
                <div class="new-suggestion-form-actions">
                    <button class="suggestion-cancel-btn" id="cancelSuggestionBtn">Cancelar</button>
                    <button class="auth-submit-btn suggestion-submit-btn" id="submitSuggestionBtn">Enviar sugerencia</button>
                </div>
            </div>
            <div class="suggestions-list" id="suggestionsList">
                <div class="suggestions-loading" id="suggestionsLoading">Cargando sugerencias...</div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="auth-modal-overlay" id="authModalOverlay">
        <div class="auth-modal" id="authModal">
            <button class="auth-modal-close" id="authModalClose" aria-label="Cerrar">&times;</button>
            <div class="auth-modal-header">
                <h2 class="auth-modal-title">Accede a cantaor.app</h2>
                <p class="auth-modal-subtitle">Registrate gratis para votar y proponer sugerencias</p>
            </div>
            <div id="authFormLogin" class="auth-form">
                <div class="form-group"><label for="loginEmail">Email</label><input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com" autocomplete="email"></div>
                <div class="form-group"><label for="loginPassword">Contrasena</label><input type="password" id="loginPassword" class="form-input" placeholder="Tu contrasena" autocomplete="current-password"></div>
                <div id="authError" class="auth-error"></div>
                <button id="loginSubmitBtn" class="auth-submit-btn">Iniciar sesion</button>
                <p class="auth-switch">No tienes cuenta? <button class="auth-switch-btn" id="switchToRegister">Registrate gratis</button></p>
            </div>
            <div id="authFormRegister" class="auth-form" style="display:none">
                <div class="form-group"><label for="registerEmail">Email</label><input type="email" id="registerEmail" class="form-input" placeholder="tu@email.com" autocomplete="email"></div>
                <div class="form-group"><label for="registerPassword">Contrasena</label><input type="password" id="registerPassword" class="form-input" placeholder="Minimo 6 caracteres" autocomplete="new-password"></div>
                <div id="authErrorRegister" class="auth-error"></div>
                <button id="registerSubmitBtn" class="auth-submit-btn">Crear cuenta gratis</button>
                <p class="auth-switch">Ya tienes cuenta? <button class="auth-switch-btn" id="switchToLogin">Inicia sesion</button></p>
            </div>
        </div>
    </div>

    <script type="module" src="sugerencias-bundle.js"></script>
</body>
</html>
